{% extends "base.html" %}

{% block content %}

<style>
    .delete-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 90vh;
        background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
    }

    .box {
        background: white;
        padding: 30px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        text-align: center;
    }

    .box h2 {
        color: red;
        margin-bottom: 10px;
    }

    .box p {
        color: #555;
    }

    .box input {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .box button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background: red;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    .box button:hover {
        background: darkred;
    }

    .cancel-link {
        display: block;
        margin-top: 15px;
        text-decoration: none;
        color: #ff1a1a;
    }

    .cancel-link:hover {
        text-decoration: underline;
    }
</style>

<div class="delete-wrapper">
    <div class="box">
        <h2>Delete Account</h2>
        <p>This action cannot be undone.</p>

        <form method="POST">
            <input type="password" name="password"
                   placeholder="Enter your password" required>

            <button type="submit">Delete My Account</button>
        </form>

        <a href="{{ url_for('profile') }}" class="cancel-link">Cancel</a>
    </div>
</div>

{% endblock %}
