<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Burger Hut</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f77f00, #d62828);
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding: 35px;
            width: 750px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 25px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-box {
            display: flex;
            flex-direction: column;
        }

        input, select {
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 5px;
        }

        .btn {
            grid-column: span 2;
            padding: 12px;
            background: yellow;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: white;
            transform: scale(1.03);
        }

        .link-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .link-text a {
            color: yellow;
            font-weight: bold;
            text-decoration: none;
        }

        .link-text a:hover {
            text-decoration: underline;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: white;
            text-decoration: none;
            font-size: 13px;
        }

        @media(max-width: 768px){
            .container{
                width: 100%;
            }
            form{
                grid-template-columns: 1fr;
            }
            .btn, .full-width{
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account 🍔</h2>

    <form method="POST">

        <div class="input-box">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <!-- ✅ Confirm Password Added -->
        <div class="input-box">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required>
        </div>

        <div class="input-box">
            <label>Date of Birth</label>
            <input type="date" name="dob" required>
        </div>

        <div class="input-box">
            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>

        <div class="input-box">
            <label>Phone Number</label>
            <input type="text" name="phone_number" maxlength="10" required>
        </div>

        <div class="input-box full-width">
            <label>Street Address</label>
            <input type="text" name="street_address" required>
        </div>

        <div class="input-box">
            <label>Area</label>
            <select name="area" required>
                <option value="">Select Area</option>
                <option>New Ranip</option>
                <option>Gota</option>
                <option>Chandlodiya</option>
                <option>Ghatlodiya</option>
            </select>
        </div>

        <div class="input-box">
            <label>City</label>
            <input type="text" name="city" required>
        </div>

        <div class="input-box">
            <label>State</label>
            <input type="text" name="state" required>
        </div>

        <div class="input-box">
            <label>Pincode</label>
            <input type="text" name="code" required>
        </div>

        <button type="submit" class="btn">Sign Up</button>

    </form>

    <div class="link-text">
        Already have an account? <a href="/login">Login</a>
    </div>

    <a href="/" class="back">⬅ Back to Home</a>
</div>

</body>
</html>
