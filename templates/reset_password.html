<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Burger Hut</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg,#f77f00,#d62828);
        }
        .box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #d62828;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        button:hover {
            background: #f77f00;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Reset Password</h2>
    <form method="POST">
        <input type="password" name="new_password" placeholder="New Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        <button type="submit">Reset Password</button>
    </form>
</div>

</body>
</html>
