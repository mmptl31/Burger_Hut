{% extends "admin_base.html" %}

{% block content %}

<style>
    .form-wrapper {
        display: flex;
        justify-content: center;
        padding: 40px 0;
    }

    .form-container {
        background: #fff;
        padding: 30px;
        width: 400px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-container input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .form-container button {
        width: 100%;
        padding: 10px;
        background: #4facfe;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
    }

    .form-container button:hover {
        background: #3a8edb;
    }
</style>

<div class="form-wrapper">
    <div class="form-container">
        <h2>Edit Delivery Boy</h2>

        <form method="POST">
            <input type="text" name="name" value="{{ boy.name }}" required>
            <input type="text" name="phone" value="{{ boy.phone }}" required>
            <input type="email" name="email" value="{{ boy.email }}" required>
            <input type="password" name="password" placeholder="New Password (Optional)">
            <button type="submit">Update Delivery</button>
        </form>
    </div>
</div>

{% endblock %}
