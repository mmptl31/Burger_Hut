<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Admin Panel{% endblock %}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body{
            display:flex;
            background:#f4f6f9;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:linear-gradient(180deg,#d62828,#f77f00);
            color:white;
            padding:30px 20px;
            position:fixed;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:rgba(255,255,255,0.2);
            padding-left:20px;
        }

        .main-content{
            margin-left:250px;
            padding:40px;
            width:100%;
        }

        .main-content h1{
            margin-bottom:30px;
            color:#d62828;
        }

        .logout{
            margin-top:50px;
            display:inline-block;
            padding:10px 25px;
            background:#d62828;
            color:white;
            text-decoration:none;
            border-radius:25px;
        }
		.card-container{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:30px;
    width:250px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}


    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Admin Panel 👨‍🍳</h2>

        <a href="/admin_dashboard">Home</a>
        <a href="/admin/view_menu">View Menu</a>
	    <a href="/admin/view_users">View Users</a>
	    <a href="/admin/view_orders">View Orders</a>
	    <a href="/admin/view_delivery">View Delivery Guy</a>
	    <a href="/admin/view_feedback">View Feedback</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
