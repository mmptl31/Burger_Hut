<!DOCTYPE html>
<html>
<head>
    <title>Delivery Login</title>
    <style>
        body{
            font-family: Arial;
            background:#fff8f0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .login-box{
            background:white;
            padding:30px;
            width:300px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }
        h2{
            text-align:center;
            color:#d62828;
        }
        input{
            width:100%;
            padding:8px;
            margin:10px 0;
        }
        button{
            width:100%;
            padding:8px;
            background:#f77f00;
            border:none;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }
        button:hover{
            background:#d62828;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Delivery Login</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
