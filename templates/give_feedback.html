{% extends "base.html" %}

{% block content %}

<style>
.feedback-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 90vh;
    background: #fff8f0;
}

.feedback-box {
    background: white;
    padding: 30px;
    width: 450px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.feedback-box h2 {
    text-align: center;
    color: #d62828;
    margin-bottom: 20px;
}

.feedback-box textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    resize: none;
}

.feedback-box button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #f77f00;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

.feedback-box button:hover {
    background: #d62828;
}
</style>

<div class="feedback-wrapper">
    <div class="feedback-box">
        <h2>Give Your Feedback 💬</h2>

        <form method="POST">
            <textarea name="message"
                placeholder="Write your feedback here..."
                required></textarea>

            <button type="submit">Submit Feedback</button>
        </form>
    </div>
</div>

{% endblock %}
